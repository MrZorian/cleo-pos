<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cleo POS</title>
<style>
  :root{
    --ink:#0d1b2a; --ink-2:#1b3a4b; --paper:#f6f4ee; --line:#e2ddd2; --line-2:#eee9de;
    --accent:#1f7a5c; --accent-soft:#e6f0ec; --amber:#e07a2e; --danger:#b23a48; --muted:#6b6b6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);height:100dvh;overflow:hidden}
  .app{display:grid;grid-template-columns:74px 1fr;height:100dvh}
  /* Sidebar */
  .nav{background:var(--ink);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px}
  .nav .mark{width:42px;height:42px;border-radius:11px;background:#fff;color:var(--ink);display:grid;place-items:center;font-weight:800;font-size:22px;margin-bottom:14px}
  .nav button{width:54px;height:54px;border:none;background:transparent;color:#9fb3c8;border-radius:12px;cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.15s}
  .nav button svg{width:21px;height:21px}
  .nav button:hover{background:#16293a;color:#fff}
  .nav button.active{background:var(--accent);color:#fff}
  .nav .spacer{flex:1}
  /* Main */
  main{overflow:hidden;display:flex;flex-direction:column}
  .topbar{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;gap:14px;background:#fff;flex-shrink:0}
  .topbar h2{font-size:18px;font-weight:800;letter-spacing:-.4px}
  .topbar .biz{color:var(--muted);font-size:13px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .pill{font-size:12px;font-weight:700;padding:5px 11px;border-radius:99px;background:var(--accent-soft);color:var(--accent-ink,#0c3a2b)}
  .who{font-size:13px;color:var(--ink-2)}
  .who b{font-weight:700}
  .logout{font-size:12px;color:var(--danger);cursor:pointer;border:none;background:none;font-weight:600}
  .view{flex:1;overflow:auto;padding:22px}
  /* ---------------- POS ---------------- */
  .pos{display:grid;grid-template-columns:1fr 380px;gap:18px;height:100%}
  .catalog{display:flex;flex-direction:column;min-height:0}
  .search{display:flex;gap:10px;margin-bottom:14px}
  .search input{flex:1;padding:13px 15px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:#fff}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,92,.12)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .chip{padding:6px 13px;border:1px solid var(--line);background:#fff;border-radius:99px;font-size:13px;cursor:pointer;font-weight:600;color:var(--ink-2)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;overflow:auto;align-content:start;padding-bottom:10px}
  .prod{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;cursor:pointer;text-align:left;transition:.12s;position:relative;min-height:104px;display:flex;flex-direction:column}
  .prod:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 20px -14px rgba(13,27,42,.5)}
  .prod:active{transform:translateY(0)}
  .prod .nm{font-weight:700;font-size:14px;line-height:1.25;margin-bottom:auto}
  .prod .pr{font-weight:800;font-size:16px;margin-top:10px;letter-spacing:-.3px}
  .prod .st{font-size:11px;color:var(--muted);margin-top:2px}
  .prod .st.out{color:var(--danger);font-weight:700}
  .prod.disabled{opacity:.45;pointer-events:none}
  /* Cart */
  .cart{background:#fff;border:1px solid var(--line);border-radius:15px;display:flex;flex-direction:column;min-height:0}
  .cart h3{padding:16px 18px;font-size:15px;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:center}
  .cart h3 .clear{font-size:12px;color:var(--danger);cursor:pointer;font-weight:600}
  .lines{flex:1;overflow:auto;padding:8px 10px}
  .empty{color:var(--muted);text-align:center;padding:50px 20px;font-size:14px}
  .line{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:9px}
  .line:hover{background:var(--line-2)}
  .line .nm{flex:1;font-size:13.5px;font-weight:600;line-height:1.2}
  .line .nm small{display:block;color:var(--muted);font-weight:500;font-size:11.5px}
  .qty{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .qty button{width:26px;height:28px;border:none;background:#fff;cursor:pointer;font-size:15px;font-weight:700;color:var(--ink-2)}
  .qty button:hover{background:var(--line-2)}
  .qty span{width:30px;text-align:center;font-size:13px;font-weight:700}
  .line .lt{width:64px;text-align:right;font-weight:700;font-size:13.5px}
  .totals{padding:14px 18px;border-top:1px solid var(--line-2);font-size:13.5px}
  .totals .r{display:flex;justify-content:space-between;margin-bottom:6px;color:var(--ink-2)}
  .totals .r.big{font-size:21px;font-weight:800;color:var(--ink);margin-top:8px;letter-spacing:-.5px}
  .totals input{width:80px;padding:4px 8px;border:1px solid var(--line);border-radius:7px;text-align:right;font-size:13px}
  .pay{display:flex;gap:10px;padding:0 18px 18px}
  .pay button{flex:1;padding:14px;border:none;border-radius:11px;font-weight:800;font-size:15px;cursor:pointer}
  .pay .cash{background:var(--accent);color:#fff}
  .pay .cash:hover{background:#196a50}
  .pay .card{background:var(--ink);color:#fff}
  .pay button:disabled{opacity:.4;cursor:not-allowed}
  /* ---------------- Tables / admin ---------------- */
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .panel-h{padding:15px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
  .panel-h h3{font-size:15px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:11px 18px;border-bottom:1px solid var(--line-2);font-weight:700}
  td{padding:12px 18px;border-bottom:1px solid var(--line-2);font-size:13.5px}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fbfaf6}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
  .tag.low{background:#fdf0e6;color:var(--amber)}
  .tag.out{background:#fdecee;color:var(--danger)}
  .tag.ok{background:var(--accent-soft);color:var(--accent)}
  .tag.ref{background:#fdecee;color:var(--danger)}
  .role{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:#eef1f4;color:var(--ink-2);text-transform:capitalize}
  .btn{padding:9px 15px;border:none;border-radius:9px;background:var(--ink);color:#fff;font-weight:700;font-size:13px;cursor:pointer}
  .btn:hover{background:var(--ink-2)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink-2)}
  .btn.ghost:hover{background:var(--line-2)}
  .btn.danger{background:none;color:var(--danger);border:1px solid #f0cdd2}
  .btn.danger:hover{background:#fdecee}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:7px}
  .stat .val{font-size:28px;font-weight:800;letter-spacing:-1px}
  .stat .val.sm{font-size:20px}
  .bars{display:flex;align-items:flex-end;gap:10px;height:130px;padding:14px 4px 0}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bar{width:100%;background:var(--accent);border-radius:6px 6px 0 0;min-height:3px;transition:height .4s}
  .bar-wrap small{font-size:11px;color:var(--muted)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  /* Forms / modal */
  .overlay{position:fixed;inset:0;background:rgba(13,27,42,.45);display:none;place-items:center;z-index:50;padding:20px}
  .overlay.show{display:grid}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;max-height:90dvh;overflow:auto;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:center}
  .modal-h h3{font-size:17px}
  .modal-h .x{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
  .modal-b{padding:22px}
  .modal-f{padding:16px 22px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin:12px 0 5px}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fcfbf8;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,92,.12)}
  .frow{display:flex;gap:12px}.frow>div{flex:1}
  .receipt{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.7;color:var(--ink)}
  .receipt .c{text-align:center}.receipt hr{border:none;border-top:1px dashed var(--line);margin:10px 0}
  .receipt .rr{display:flex;justify-content:space-between}
  .change-banner{background:var(--accent-soft);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px}
  .change-banner .big{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:-1px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-weight:600;font-size:14px;z-index:80;transition:transform .3s;box-shadow:0 12px 30px -10px rgba(0,0,0,.5)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--danger)}
  .muted{color:var(--muted)}
  .hide{display:none!important}
  @media(max-width:880px){
    .pos{grid-template-columns:1fr}
    .cart{position:fixed;inset:auto 0 0 0;border-radius:18px 18px 0 0;max-height:55dvh;z-index:30;box-shadow:0 -10px 40px -20px rgba(0,0,0,.4)}
    .two{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="mark">C</div>
    <button data-tab="pos" class="active" onclick="go('pos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Sell</button>
    <button data-tab="products" onclick="go('products')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7 12 3 4 7v10l8 4 8-4z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg>Items</button>
    <button data-tab="sales" onclick="go('sales')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16l-3-2-3 2-3-2-3 2-3-2z"/><path d="M8 9h8M8 13h6"/></svg>Sales</button>
    <button data-tab="dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h6V3H3zM15 21h6V11h-6zM15 3v4h6V3zM3 21h6v-4H3z"/></svg>Stats</button>
    <div class="spacer"></div>
    <button data-tab="staff" onclick="go('staff')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5M16 6a3 3 0 0 1 0 6M21 20c0-2-1-3.5-3-4"/></svg>Staff</button>
    <button data-tab="settings" onclick="go('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg>Setup</button>
  </nav>

  <main>
    <div class="topbar">
      <h2 id="title">Sell</h2>
      <span class="biz" id="bizName"></span>
      <div class="right">
        <span class="pill" id="planPill">Trial</span>
        <span class="who">Hi, <b id="userName"></b></span>
        <button class="logout" onclick="logout()">Sign out</button>
      </div>
    </div>
    <div class="view" id="view"></div>
  </main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script src="/config.js"></script>
<script>
const API = window.CLEO_API_URL || location.origin;
const token = localStorage.getItem('cleo_token');
let USER = JSON.parse(localStorage.getItem('cleo_user')||'null');
let TENANT = JSON.parse(localStorage.getItem('cleo_tenant')||'null');
if(!token||!USER){location.href='/';}

// ---- API helper ----
async function api(path, opts={}){
  const r = await fetch(API+path,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});
  if(r.status===401){logout();return;}
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error||'Request failed');
  return data;
}
function logout(){localStorage.clear();location.href='/';}

// ---- money ----
const CUR = ()=>TENANT.currency||'USD';
function money(cents){
  try{return new Intl.NumberFormat(undefined,{style:'currency',currency:CUR()}).format((cents||0)/100);}
  catch{return (CUR()+' ')+((cents||0)/100).toFixed(2);}
}
function toast(msg,isErr){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');setTimeout(()=>t.className='toast',2200);}

// ---- modal ----
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').onclick=(e)=>{if(e.target.id==='overlay')closeModal();};

// ---- header ----
document.getElementById('bizName').textContent = TENANT.name;
document.getElementById('userName').textContent = USER.name.split(' ')[0];
document.getElementById('planPill').textContent = (TENANT.plan||'trial').replace(/^\w/,c=>c.toUpperCase());
const isAdmin = ()=>USER.role==='owner'||USER.role==='manager';

// ---- nav ----
const TITLES={pos:'Sell',products:'Items',sales:'Sales',dashboard:'Stats',staff:'Staff',settings:'Setup'};
function go(tab){
  if((tab==='staff'||tab==='settings')&&!isAdmin()){toast('Managers and owners only',true);return;}
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('title').textContent=TITLES[tab];
  ({pos:renderPOS,products:renderProducts,sales:renderSales,dashboard:renderDashboard,staff:renderStaff,settings:renderSettings})[tab]();
}

// ===========================================================================
// POS
// ===========================================================================
let PRODUCTS=[], CATS=[], cart=[], activeCat='all';
async function renderPOS(){
  document.getElementById('view').innerHTML=`
   <div class="pos">
     <div class="catalog">
       <div class="search"><input id="q" placeholder="Search items or scan a barcode…" autocomplete="off"></div>
       <div class="chips" id="chips"></div>
       <div class="grid" id="grid"></div>
     </div>
     <div class="cart">
       <h3>Current sale <span class="clear" onclick="clearCart()">Clear</span></h3>
       <div class="lines" id="lines"></div>
       <div class="totals" id="totals"></div>
       <div class="pay">
         <button class="cash" id="payCash" onclick="checkout('cash')">Charge</button>
         <button class="card" id="payCard" onclick="checkout('card')">Card</button>
       </div>
     </div>
   </div>`;
  [PRODUCTS,CATS]=await Promise.all([api('/api/products'),api('/api/categories')]);
  renderChips(); renderGrid(); renderCart();
  const q=document.getElementById('q');
  q.oninput=()=>renderGrid();
  q.onkeydown=(e)=>{ if(e.key==='Enter'){ const hit=PRODUCTS.find(p=>p.barcode&&p.barcode===q.value.trim()); if(hit){addToCart(hit);q.value='';renderGrid();} } };
  q.focus();
}
function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML=`<div class="chip ${activeCat==='all'?'active':''}" onclick="setCat('all')">All</div>`+
    CATS.map(c=>`<div class="chip ${activeCat===c.id?'active':''}" onclick="setCat('${c.id}')">${esc(c.name)}</div>`).join('');
}
function setCat(id){activeCat=id;renderChips();renderGrid();}
function renderGrid(){
  const q=(document.getElementById('q')?.value||'').toLowerCase();
  const list=PRODUCTS.filter(p=>(activeCat==='all'||p.category_id===activeCat)&&
    (!q||p.name.toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q)||(p.barcode||'').includes(q)));
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1">No items. Add some under <b>Items</b>.</div>`;return;}
  g.innerHTML=list.map(p=>{
    const out=p.stock<=0;
    return `<button class="prod ${out?'disabled':''}" onclick='addToCart(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <div class="nm">${esc(p.name)}</div>
      <div class="pr">${money(p.price_cents)}</div>
      <div class="st ${out?'out':''}">${out?'Out of stock':p.stock+' in stock'}</div>
    </button>`;
  }).join('');
}
function addToCart(p){
  const line=cart.find(l=>l.product_id===p.id);
  const inStock=PRODUCTS.find(x=>x.id===p.id)?.stock??p.stock;
  if(line){ if(line.qty>=inStock){toast('No more stock',true);return;} line.qty++; }
  else cart.push({product_id:p.id,name:p.name,price_cents:p.price_cents,qty:1});
  renderCart();
}
function chQty(i,d){
  const l=cart[i]; const inStock=PRODUCTS.find(x=>x.id===l.product_id)?.stock??99;
  l.qty+=d; if(l.qty<=0)cart.splice(i,1); else if(l.qty>inStock){l.qty=inStock;toast('No more stock',true);}
  renderCart();
}
function clearCart(){cart=[];renderCart();}
function cartTotals(){
  let subtotal=0,taxBase=0;
  cart.forEach(l=>{const t=l.price_cents*l.qty;subtotal+=t;if(PRODUCTS.find(p=>p.id===l.product_id)?.taxable)taxBase+=t;});
  const tax=Math.round(taxBase*(TENANT.tax_rate||0)/100);
  return {subtotal,tax,total:subtotal+tax};
}
function renderCart(){
  const lines=document.getElementById('lines'); if(!lines)return;
  if(!cart.length){lines.innerHTML=`<div class="empty">Tap items to start a sale</div>`;}
  else lines.innerHTML=cart.map((l,i)=>`
    <div class="line">
      <div class="nm">${esc(l.name)}<small>${money(l.price_cents)} each</small></div>
      <div class="qty"><button onclick="chQty(${i},-1)">−</button><span>${l.qty}</span><button onclick="chQty(${i},1)">+</button></div>
      <div class="lt">${money(l.price_cents*l.qty)}</div>
    </div>`).join('');
  const t=cartTotals();
  document.getElementById('totals').innerHTML=`
    <div class="r"><span>Subtotal</span><span>${money(t.subtotal)}</span></div>
    ${TENANT.tax_rate>0?`<div class="r"><span>Tax (${TENANT.tax_rate}%)</span><span>${money(t.tax)}</span></div>`:''}
    <div class="r big"><span>Total</span><span>${money(t.total)}</span></div>`;
  document.getElementById('payCash').disabled=document.getElementById('payCard').disabled=!cart.length;
}
async function checkout(method){
  if(!cart.length)return;
  const t=cartTotals();
  if(method==='cash'){
    openModal(`<div class="modal-h"><h3>Cash payment</h3><button class="x" onclick="closeModal()">×</button></div>
      <div class="modal-b">
        <div class="r" style="display:flex;justify-content:space-between;font-size:20px;font-weight:800;margin-bottom:16px"><span>Total due</span><span>${money(t.total)}</span></div>
        <label>Amount received</label>
        <input id="received" type="number" inputmode="decimal" step="0.01" value="${(t.total/100).toFixed(2)}" style="font-size:20px;font-weight:700;text-align:right">
        <div class="frow" style="margin-top:10px">
          ${quickCash(t.total).map(c=>`<button class="btn ghost" onclick="document.getElementById('received').value='${(c/100).toFixed(2)}'">${money(c)}</button>`).join('')}
        </div>
      </div>
      <div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="finalize('cash')">Complete sale</button></div>`);
    setTimeout(()=>document.getElementById('received').select(),50);
  } else {
    finalize('card');
  }
}
function quickCash(total){
  const ex=Math.ceil(total/100)*100; const set=new Set([total,ex,ex+500,Math.ceil(total/1000)*1000,Math.ceil(total/2000)*2000]);
  return [...set].filter(v=>v>=total).sort((a,b)=>a-b).slice(0,4);
}
async function finalize(method){
  const t=cartTotals();
  let paid=t.total;
  if(method==='cash'){ paid=Math.round(parseFloat(document.getElementById('received').value||'0')*100);
    if(paid<t.total){toast('Not enough cash received',true);return;} }
  try{
    const sale=await api('/api/sales',{method:'POST',body:JSON.stringify({
      items:cart.map(l=>({product_id:l.product_id,qty:l.qty})), pay_method:method, paid_cents:paid
    })});
    cart=[]; closeModal(); showReceipt(sale,true);
    PRODUCTS=await api('/api/products'); renderGrid(); renderCart();
  }catch(e){toast(e.message,true);}
}
function showReceipt(s,withChange){
  const items=s.items.map(it=>`<div class="rr"><span>${it.qty}× ${esc(it.name)}</span><span>${money(it.line_cents)}</span></div>`).join('');
  openModal(`<div class="modal-h"><h3>Sale #${s.number}</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="modal-b">
     ${withChange&&s.change_cents>0?`<div class="change-banner"><div class="muted">Change due</div><div class="big">${money(s.change_cents)}</div></div>`:''}
     <div class="receipt">
       <div class="c"><b>${esc(TENANT.name)}</b></div>
       <div class="c muted">Sale #${s.number} · ${new Date(s.created_at).toLocaleString()}</div>
       <div class="c muted">Cashier: ${esc(s.cashier||USER.name)}</div>
       <hr>${items}<hr>
       <div class="rr"><span>Subtotal</span><span>${money(s.subtotal_cents)}</span></div>
       ${s.tax_cents>0?`<div class="rr"><span>Tax</span><span>${money(s.tax_cents)}</span></div>`:''}
       <div class="rr"><b>Total</b><b>${money(s.total_cents)}</b></div>
       <div class="rr"><span>Paid (${esc(s.pay_method)})</span><span>${money(s.paid_cents)}</span></div>
       ${s.change_cents>0?`<div class="rr"><span>Change</span><span>${money(s.change_cents)}</span></div>`:''}
       ${s.status==='refunded'?'<hr><div class="c"><b style="color:#b23a48">*** REFUNDED ***</b></div>':''}
       <hr><div class="c muted">${esc(TENANT.receipt_note||'')}</div>
     </div>
   </div>
   <div class="modal-f"><button class="btn ghost" onclick="window.print()">Print</button><button class="btn" onclick="closeModal()">Done</button></div>`);
}

// ===========================================================================
// PRODUCTS
// ===========================================================================
async function renderProducts(){
  const [products,cats]=await Promise.all([api('/api/products'),api('/api/categories')]);
  PRODUCTS=products;CATS=cats;
  const rows=products.map(p=>{
    const tag=p.stock<=0?'<span class="tag out">Out</span>':p.stock<=p.low_stock?`<span class="tag low">Low · ${p.stock}</span>`:`<span class="tag ok">${p.stock}</span>`;
    const cat=cats.find(c=>c.id===p.category_id);
    return `<tr>
      <td><b>${esc(p.name)}</b>${p.sku?`<br><small class="muted">${esc(p.sku)}</small>`:''}</td>
      <td class="muted">${cat?esc(cat.name):'—'}</td>
      <td>${money(p.price_cents)}</td>
      <td>${tag}</td>
      <td style="text-align:right">${isAdmin()?`<button class="btn sm ghost" onclick='editProduct(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Edit</button>`:''}</td>
    </tr>`;
  }).join('');
  document.getElementById('view').innerHTML=`
    <div class="panel">
      <div class="panel-h"><h3>Items <span class="muted" style="font-weight:400">· ${products.length}</span></h3>
        ${isAdmin()?`<div style="display:flex;gap:8px"><button class="btn ghost sm" onclick="manageCats()">Categories</button><button class="btn" onclick="editProduct()">+ New item</button></div>`:''}</div>
      <table><thead><tr><th>Item</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr></thead>
      <tbody>${rows||`<tr><td colspan="5" class="muted" style="text-align:center;padding:40px">No items yet</td></tr>`}</tbody></table>
    </div>`;
}
function editProduct(p){
  const opts=`<option value="">No category</option>`+CATS.map(c=>`<option value="${c.id}" ${p&&p.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  openModal(`<div class="modal-h"><h3>${p?'Edit item':'New item'}</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="modal-b">
     <label>Name</label><input id="p-name" value="${p?esc(p.name):''}" placeholder="e.g. Cappuccino">
     <div class="frow">
       <div><label>Price</label><input id="p-price" type="number" step="0.01" value="${p?(p.price_cents/100).toFixed(2):''}"></div>
       <div><label>Cost (optional)</label><input id="p-cost" type="number" step="0.01" value="${p?(p.cost_cents/100).toFixed(2):''}"></div>
     </div>
     <label>Category</label><select id="p-cat">${opts}</select>
     <div class="frow">
       <div><label>Stock</label><input id="p-stock" type="number" value="${p?p.stock:0}"></div>
       <div><label>Low-stock alert</label><input id="p-low" type="number" value="${p?p.low_stock:5}"></div>
     </div>
     <div class="frow">
       <div><label>SKU</label><input id="p-sku" value="${p?esc(p.sku||''):''}"></div>
       <div><label>Barcode</label><input id="p-bar" value="${p?esc(p.barcode||''):''}"></div>
     </div>
     <label style="display:flex;align-items:center;gap:8px;margin-top:14px"><input type="checkbox" id="p-tax" style="width:auto" ${!p||p.taxable?'checked':''}> Apply tax to this item</label>
   </div>
   <div class="modal-f">
     ${p?`<button class="btn danger" style="margin-right:auto" onclick="delProduct('${p.id}')">Delete</button>`:''}
     <button class="btn ghost" onclick="closeModal()">Cancel</button>
     <button class="btn" onclick="saveProduct('${p?p.id:''}')">Save</button>
   </div>`);
}
async function saveProduct(id){
  const body={
    name:gv('p-name'),
    price_cents:Math.round(parseFloat(gv('p-price')||'0')*100),
    cost_cents:Math.round(parseFloat(gv('p-cost')||'0')*100),
    category_id:gv('p-cat')||null,
    stock:parseInt(gv('p-stock')||'0'),
    low_stock:parseInt(gv('p-low')||'5'),
    sku:gv('p-sku'),barcode:gv('p-bar'),
    taxable:document.getElementById('p-tax').checked
  };
  if(!body.name){toast('Name required',true);return;}
  try{
    await api(id?`/api/products/${id}`:'/api/products',{method:id?'PUT':'POST',body:JSON.stringify(body)});
    closeModal();toast('Saved');renderProducts();
  }catch(e){toast(e.message,true);}
}
async function delProduct(id){
  if(!confirm('Delete this item?'))return;
  await api(`/api/products/${id}`,{method:'DELETE'});closeModal();toast('Deleted');renderProducts();
}
async function manageCats(){
  const cats=await api('/api/categories');
  openModal(`<div class="modal-h"><h3>Categories</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="modal-b">
     <div class="frow"><input id="c-name" placeholder="New category"><button class="btn" onclick="addCat()">Add</button></div>
     <div style="margin-top:16px">${cats.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line-2)"><span>${esc(c.name)}</span><button class="btn sm danger" onclick="delCat('${c.id}')">Remove</button></div>`).join('')||'<div class="muted">None yet</div>'}</div>
   </div><div class="modal-f"><button class="btn" onclick="closeModal();renderProducts()">Done</button></div>`);
}
async function addCat(){const n=gv('c-name');if(!n)return;await api('/api/categories',{method:'POST',body:JSON.stringify({name:n})});manageCats();}
async function delCat(id){await api(`/api/categories/${id}`,{method:'DELETE'});manageCats();}

// ===========================================================================
// SALES
// ===========================================================================
async function renderSales(){
  const sales=await api('/api/sales');
  const rows=sales.map(s=>`<tr style="cursor:pointer" onclick="openSale('${s.id}')">
    <td><b>#${s.number}</b></td>
    <td class="muted">${new Date(s.created_at).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
    <td class="muted">${esc(s.cashier)}</td>
    <td style="text-transform:capitalize">${esc(s.pay_method)}</td>
    <td><b>${money(s.total_cents)}</b></td>
    <td>${s.status==='refunded'?'<span class="tag ref">Refunded</span>':'<span class="tag ok">Done</span>'}</td>
  </tr>`).join('');
  document.getElementById('view').innerHTML=`
    <div class="panel"><div class="panel-h"><h3>Recent sales</h3></div>
    <table><thead><tr><th>Sale</th><th>When</th><th>Cashier</th><th>Method</th><th>Total</th><th>Status</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="6" class="muted" style="text-align:center;padding:40px">No sales yet</td></tr>`}</tbody></table></div>`;
}
async function openSale(id){
  const s=await api(`/api/sales/${id}`);
  showReceipt(s,false);
  if(isAdmin()&&s.status!=='refunded'){
    const f=document.querySelector('.modal-f');
    const b=document.createElement('button');b.className='btn danger';b.style.marginRight='auto';b.textContent='Refund';
    b.onclick=async()=>{ if(!confirm('Refund this sale and restock items?'))return;
      await api(`/api/sales/${id}/refund`,{method:'POST'});closeModal();toast('Refunded');renderSales(); };
    f.insertBefore(b,f.firstChild);
  }
}

// ===========================================================================
// DASHBOARD
// ===========================================================================
async function renderDashboard(){
  const d=await api('/api/dashboard');
  const max=Math.max(1,...d.series.map(s=>s.revenue));
  document.getElementById('view').innerHTML=`
    <div class="cards">
      <div class="stat"><div class="lbl">Revenue today</div><div class="val">${money(d.today.revenue)}</div></div>
      <div class="stat"><div class="lbl">Sales today</div><div class="val">${d.today.txns}</div></div>
      <div class="stat"><div class="lbl">Avg. sale</div><div class="val sm">${money(d.today.txns?Math.round(d.today.revenue/d.today.txns):0)}</div></div>
    </div>
    <div class="two">
      <div class="panel"><div class="panel-h"><h3>Last 7 days</h3></div>
        <div class="bars">${d.series.map(s=>`<div class="bar-wrap"><div class="bar" style="height:${Math.round(s.revenue/max*100)}%" title="${money(s.revenue)}"></div><small>${s.day}</small></div>`).join('')}</div>
      </div>
      <div class="panel"><div class="panel-h"><h3>Low stock</h3></div>
        <table><tbody>${d.low.length?d.low.map(l=>`<tr><td>${esc(l.name)}</td><td style="text-align:right">${l.stock<=0?'<span class="tag out">Out</span>':`<span class="tag low">${l.stock} left</span>`}</td></tr>`).join(''):`<tr><td class="muted" style="padding:30px;text-align:center">All stocked up</td></tr>`}</tbody></table>
      </div>
    </div>
    <div class="panel" style="margin-top:18px"><div class="panel-h"><h3>Top sellers (7 days)</h3></div>
      <table><thead><tr><th>Item</th><th>Units</th><th>Revenue</th></tr></thead><tbody>
      ${d.top.length?d.top.map(t=>`<tr><td>${esc(t.name)}</td><td>${t.qty}</td><td>${money(t.revenue)}</td></tr>`).join(''):`<tr><td colspan="3" class="muted" style="text-align:center;padding:30px">No sales yet</td></tr>`}
      </tbody></table>
    </div>`;
}

// ===========================================================================
// STAFF
// ===========================================================================
async function renderStaff(){
  const staff=await api('/api/staff');
  const rows=staff.filter(s=>s.active).map(s=>`<tr>
    <td><b>${esc(s.name)}</b><br><small class="muted">${esc(s.email)}</small></td>
    <td><span class="role">${s.role}</span></td>
    <td style="text-align:right">${USER.role==='owner'&&s.id!==USER.id?`<button class="btn sm danger" onclick="delStaff('${s.id}')">Remove</button>`:s.id===USER.id?'<span class="muted">You</span>':''}</td>
  </tr>`).join('');
  document.getElementById('view').innerHTML=`
    <div class="panel"><div class="panel-h"><h3>Team</h3><button class="btn" onclick="addStaff()">+ Add member</button></div>
    <table><thead><tr><th>Member</th><th>Role</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function addStaff(){
  openModal(`<div class="modal-h"><h3>Add team member</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="modal-b">
     <label>Name</label><input id="s-name">
     <label>Email</label><input id="s-email" type="email">
     <label>Role</label><select id="s-role"><option value="cashier">Cashier</option><option value="manager">Manager</option></select>
     <label>Temporary password</label><input id="s-pass" type="text" placeholder="6+ characters">
   </div>
   <div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveStaff()">Add member</button></div>`);
}
async function saveStaff(){
  try{
    await api('/api/staff',{method:'POST',body:JSON.stringify({name:gv('s-name'),email:gv('s-email'),role:gv('s-role'),password:gv('s-pass')})});
    closeModal();toast('Member added');renderStaff();
  }catch(e){toast(e.message,true);}
}
async function delStaff(id){if(!confirm('Remove this member?'))return;await api(`/api/staff/${id}`,{method:'DELETE'});toast('Removed');renderStaff();}

// ===========================================================================
// SETTINGS
// ===========================================================================
function renderSettings(){
  document.getElementById('view').innerHTML=`
    <div class="panel" style="max-width:560px">
      <div class="panel-h"><h3>Business setup</h3></div>
      <div style="padding:22px">
        <label>Business name</label><input id="set-name" value="${esc(TENANT.name)}">
        <div class="frow">
          <div><label>Currency</label><select id="set-cur">${['USD','EUR','GBP','PKR','AED','INR','CAD','AUD'].map(c=>`<option ${TENANT.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
          <div><label>Tax rate (%)</label><input id="set-tax" type="number" step="0.01" value="${TENANT.tax_rate}"></div>
        </div>
        <label>Receipt footer message</label><textarea id="set-note" rows="2">${esc(TENANT.receipt_note||'')}</textarea>
        <button class="btn" style="margin-top:20px" onclick="saveSettings()">Save changes</button>
      </div>
    </div>`;
}
async function saveSettings(){
  try{
    const t=await api('/api/settings',{method:'PUT',body:JSON.stringify({
      name:gv('set-name'),currency:gv('set-cur'),tax_rate:parseFloat(gv('set-tax')||'0'),receipt_note:gv('set-note')
    })});
    TENANT=t;localStorage.setItem('cleo_tenant',JSON.stringify(t));
    document.getElementById('bizName').textContent=t.name;
    toast('Settings saved');
  }catch(e){toast(e.message,true);}
}

// ---- utils ----
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function gv(id){return document.getElementById(id).value.trim();}

go('pos');
</script>
